name: expense_tracker
description: An expense tracking app built with Flutter.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=2.18.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  flutter_riverpod: ^2.0.0
  go_router: ^7.0.0
  hive: ^2.0.0
  hive_flutter: ^1.1.0
  fl_chart: ^0.60.0
  path_provider: ^2.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Lint rules
  flutter_lints: ^2.0.0

  # Hive codegen
  hive_generator: ^2.0.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
